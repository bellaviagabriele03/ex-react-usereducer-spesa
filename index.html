<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    <!-- CDN REACT -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- MOTORE REACT PER MONTAGGIO COMPONENTI -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- CDN BABEL PER LETTURA E SCRITTURE JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- COMPONENTE PER LA LISTA DEI PRODOTTI -->
    <script type="text/babel">
        const { useState } = React;
        const ProductsList = () => {

            const products = [
                { name: 'Mela', price: 0.5 },
                { name: 'Pane', price: 1.2 },
                { name: 'Latte', price: 1.0 },
                { name: 'Pasta', price: 0.7 },
            ];

            const [cart, setCart] = useState([])


            function addToCart(product) {

                const isProductAdd = cart.some(p => p.name === product.name)

                if (isProductAdd) {
                    return;
                }

                setCart(curr => [...curr, { ...product, quantity: 1 }])

            }
            console.log(cart);

            return (
                <>
                    <div>
                        <div>
                            <ul>
                                {products.map((p, i) => {
                                    return (

                                        <li key={i}>
                                            {p.name}

                                            <span><strong>{p.price} €</strong></span>
                                            <button
                                                onClick={() => {
                                                    addToCart(p)
                                                }}
                                                className="btn ">aggiungi al carrello</button>
                                        </li >

                                    )
                                })}
                            </ul>
                        </div>
                        <div>
                            <h1 className="title">CARRELLO</h1>

                            {cart.length > 0 && (<>
                                <ul>
                                    {cart.map((p, i) => (
                                        <li>
                                            {p.quantity} X {p.name}
                                        </li>
                                    ))}
                                </ul>
                            </>)

                            }

                        </div>
                    </div>

                </>
            )
        }

    </script>

    <!-- MONTAGGIO DEL COMPONENTE NEL DOM -->
    <script type="text/babel">
        const { createRoot } = ReactDOM;
        const element = createRoot(document.querySelector(".products-list"))
        element.render(<ProductsList />)


    </script>
</head>

<body>
    <h1 class="title">I NOSTRI PRODOTTI</h1>
    <div class="container">
        <div class="products-list"></div>

    </div>

</body>

</html>
